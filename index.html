<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Film Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#f2ede4; --night:#171522; --night-2:#211e30; --night-3:#2a2640;
    --marquee:#ffb627; --stub:#e63946; --teal:#3a7d7c; --dim:#a49bc4;
    --rule: rgba(242,237,228,0.14);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--night); color:var(--ink); font-family:'Source Serif 4', Georgia, serif; -webkit-font-smoothing:antialiased; }
  img{ max-width:100%; display:block; }

  .marquee-bar{ background: repeating-linear-gradient(90deg, var(--night-2) 0 40px, #262238 40px 41px); border-bottom: 3px solid var(--marquee); overflow:hidden; white-space:nowrap; padding:10px 0; }
  .marquee-track{ display:inline-block; padding-left:100%; animation: scroll 22s linear infinite; font-family:'Bebas Neue', sans-serif; font-size:20px; letter-spacing:0.08em; color:var(--marquee); }
  @media (prefers-reduced-motion: reduce){ .marquee-track{ animation:none; padding-left:16px; } }
  @keyframes scroll{ 0%{transform:translateX(0);} 100%{transform:translateX(-100%);} }

  header.hero{ padding:28px 20px 20px; text-align:center; border-bottom:1px solid var(--rule); }
  header.hero h1{ font-size:56px; line-height:0.9; margin:0; color:var(--ink); font-family:'Bebas Neue', sans-serif; letter-spacing:0.04em; }
  header.hero h1 span{ color:var(--stub); }
  header.hero .sub{ color:var(--dim); font-size:14px; margin-top:8px; font-family:'IBM Plex Mono', monospace; letter-spacing:0.03em; }

  main{ max-width:640px; margin:0 auto; padding:20px 16px 80px; }
  .status{ text-align:center; color:var(--dim); font-family:'IBM Plex Mono', monospace; font-size:13px; padding:30px 0; }

  .ticket{ position:relative; background:var(--night-2); border-radius:14px; margin-bottom:22px; box-shadow:0 8px 24px rgba(0,0,0,0.35); overflow:hidden; }
  .ticket-head{ display:flex; justify-content:space-between; align-items:baseline; padding:16px 20px 12px; border-bottom:2px dashed var(--rule); }
  .ticket-head .date{ font-family:'Bebas Neue', sans-serif; font-size:26px; color:var(--marquee); letter-spacing:0.03em; }
  .ticket-head .adm{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--dim); border:1px solid var(--dim); border-radius:4px; padding:2px 6px; }
  .ticket-body{ padding:18px 20px 22px; }
  .section-label{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--teal); margin:20px 0 10px; }
  .section-label:first-child{ margin-top:0; }

  .top-story p, .uk p{ margin:4px 0 0; line-height:1.55; font-size:16px; }
  .uk p{ font-size:15px; font-style:italic; }

  .source-link{ display:inline-block; margin-top:8px; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--marquee); text-decoration:none; border-bottom:1px solid rgba(255,182,39,0.4); }
  .source-link:hover{ border-bottom-color:var(--marquee); }

  .trailer-card{ margin-bottom:16px; border-radius:10px; overflow:hidden; background:var(--night-3); border-left:3px solid var(--stub); }
  .trailer-thumb-wrap{ position:relative; cursor:pointer; aspect-ratio:16/9; background:#000; }
  .trailer-thumb-wrap img{ width:100%; height:100%; object-fit:cover; opacity:0.85; }
  .trailer-thumb-wrap .play-badge{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; border-radius:50%; background:rgba(230,57,70,0.92); display:flex; align-items:center; justify-content:center; }
  .trailer-thumb-wrap .play-badge::after{ content:''; width:0; height:0; border-top:11px solid transparent; border-bottom:11px solid transparent; border-left:18px solid var(--ink); margin-left:4px; }
  .trailer-embed{ position:relative; width:100%; aspect-ratio:16/9; }
  .trailer-embed iframe{ width:100%; height:100%; border:0; }
  .trailer-info{ padding:12px 14px 14px; }
  .trailer-info .t-title{ font-weight:700; font-size:15px; }
  .trailer-info .t-hook{ font-size:14px; color:var(--ink); margin-top:2px; }

  .briefs .brief-item{ margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--rule); font-size:15px; line-height:1.5; }
  .briefs .brief-item:last-child{ border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .briefs .brief-item p{ margin:0; }

  .empty-note{ color:var(--dim); font-size:14px; font-family:'IBM Plex Mono', monospace; }

  .tweet-embed{ margin:10px 0; border-radius:10px; overflow:hidden; background:var(--night-3); }
  .tweet-embed:empty{ display:none; }
  .tweet-loading{ padding:16px; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--dim); }
  .tweet-fallback{ display:block; padding:14px 16px; font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--marquee); text-decoration:none; border:1px dashed var(--rule); border-radius:10px; }
  .tweet-embed .twitter-tweet, .tweet-embed iframe{ margin:0 !important; max-width:100% !important; }

  .archive-label{ font-family:'Bebas Neue', sans-serif; font-size:20px; color:var(--dim); letter-spacing:0.05em; margin:30px 0 10px; border-top:1px solid var(--rule); padding-top:24px; }
  details.past{ background:var(--night-2); border-radius:10px; margin-bottom:10px; padding:0 16px; }
  details.past summary{ cursor:pointer; padding:14px 0; font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--ink); display:flex; justify-content:space-between; list-style:none; }
  details.past summary::-webkit-details-marker{ display:none; }
  details.past summary .d{ color:var(--marquee); }
  details.past .past-body{ padding-bottom:16px; }
  details.past .ticket{ box-shadow:none; margin-bottom:0; }

  .install-hint{ text-align:center; color:var(--dim); font-size:12px; font-family:'IBM Plex Mono', monospace; margin-top:30px; line-height:1.6; }
</style>
</head>
<body>

<div class="marquee-bar">
  <div class="marquee-track" id="tickerText">★ NOW SHOWING — YOUR DAILY FILM BRIEFING ★ NO ALGORITHM REQUIRED ★</div>
</div>

<header class="hero">
  <h1>DAILY FILM<br><span>BRIEFING</span></h1>
  <div class="sub">no feed. no scroll. just the news.</div>
</header>

<main>
  <div id="todayArea"></div>
  <div id="archiveLabel" class="archive-label" style="display:none;">PREVIOUSLY SHOWING</div>
  <div id="archiveArea"></div>
  <div class="install-hint">
    Tip: on iPhone, tap Share → "Add to Home Screen" to keep this as a one-tap app icon.<br>On Android, use the browser menu → "Add to Home screen."
  </div>
</main>

<!-- BRIEFINGS_DATA_START -->
<script id="briefings-data" type="application/json">
{}
</script>
<!-- BRIEFINGS_DATA_END -->

<script>
(function(){
  const todayArea = document.getElementById('todayArea');
  const archiveArea = document.getElementById('archiveArea');
  const archiveLabel = document.getElementById('archiveLabel');
  const ticker = document.getElementById('tickerText');

  let BRIEFINGS = {};
  try{ BRIEFINGS = JSON.parse(document.getElementById('briefings-data').textContent.trim() || '{}'); }
  catch(e){ console.error('Could not parse briefings data', e); }

  function escapeHtml(str){
    return String(str==null?'':str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }
  function prettyDate(key){
    const d = new Date(key + 'T12:00:00');
    return d.toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' });
  }
  function extractYouTubeId(url){
    if(!url) return null;
    const patterns = [
      /youtu\.be\/([A-Za-z0-9_-]{6,})/,
      /youtube\.com\/watch\?[^#]*v=([A-Za-z0-9_-]{6,})/,
      /youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/,
      /youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/
    ];
    for(const re of patterns){ const m = url.match(re); if(m) return m[1]; }
    return null;
  }
  function sourceLink(name, url){
    if(!url) return '';
    return `<a class="source-link" href="${escapeHtml(url)}" target="_blank" rel="noopener">Source: ${escapeHtml(name||'link')} ↗</a>`;
  }
  function readMoreLink(url){
    if(!url) return '';
    return `<a class="source-link" href="${escapeHtml(url)}" target="_blank" rel="noopener">Read more ↗</a>`;
  }
  function tweetEmbedPlaceholder(url){
    if(!url) return '';
    const uid = 'tweet_' + Math.random().toString(36).slice(2,9);
    return `<div class="tweet-embed" id="${uid}" data-tweet-url="${escapeHtml(url)}"><div class="tweet-loading">loading post…</div></div>`;
  }

  let twitterWidgetsPromise = null;
  function loadTwitterWidgets(){
    if(twitterWidgetsPromise) return twitterWidgetsPromise;
    twitterWidgetsPromise = new Promise((resolve) => {
      if(window.twttr && window.twttr.widgets){ resolve(); return; }
      const s = document.createElement('script');
      s.src = 'https://platform.twitter.com/widgets.js';
      s.async = true;
      s.onload = () => resolve();
      s.onerror = () => resolve();
      document.body.appendChild(s);
      setTimeout(resolve, 4000);
    });
    return twitterWidgetsPromise;
  }

  async function hydrateTweetEmbeds(root){
    const nodes = root.querySelectorAll('.tweet-embed[data-tweet-url]');
    if(!nodes.length) return;
    await loadTwitterWidgets();
    for(const node of nodes){
      const url = node.getAttribute('data-tweet-url');
      try{
        const res = await fetch('https://publish.twitter.com/oembed?url=' + encodeURIComponent(url) + '&omit_script=true&dnt=true&theme=dark');
        if(!res.ok) throw new Error('oembed ' + res.status);
        const j = await res.json();
        if(!j || !j.html) throw new Error('no html');
        node.innerHTML = j.html;
        node.removeAttribute('data-tweet-url');
        if(window.twttr && window.twttr.widgets){ window.twttr.widgets.load(node); }
      }catch(e){
        node.innerHTML = `<a class="tweet-fallback" href="${escapeHtml(url)}" target="_blank" rel="noopener">View original post on X ↗</a>`;
        node.removeAttribute('data-tweet-url');
      }
    }
  }

  function trailerCard(t, idx){
    const ytId = extractYouTubeId(t.youtube_url || t.link);
    const thumb = ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : '';
    const uid = 'trailer_' + idx + '_' + Math.random().toString(36).slice(2,7);
    const mediaHtml = ytId
      ? `<div class="trailer-thumb-wrap" id="${uid}" tabindex="0" role="button" aria-label="Play trailer for ${escapeHtml(t.title||'')}"
           onclick="window.__playTrailer('${uid}','${ytId}')"
           onkeypress="if(event.key==='Enter'){window.__playTrailer('${uid}','${ytId}')}">
           <img src="${escapeHtml(thumb)}" alt="${escapeHtml(t.title||'')} trailer thumbnail" loading="lazy" onerror="this.src=''; this.style.background='#000';">
           <div class="play-badge"></div>
         </div>` : '';
    const tweetEmbed = tweetEmbedPlaceholder(t.tweet_url);
    return `
      <div class="trailer-card">
        ${mediaHtml}
        <div class="trailer-info">
          <div class="t-title">${escapeHtml(t.title||'')}</div>
          <div class="t-hook">${escapeHtml(t.hook||'')}</div>
          ${!t.tweet_url ? sourceLink(t.source_name, t.source_url || t.link) : ''}
        </div>
        ${tweetEmbed}
      </div>`;
  }
  window.__playTrailer = function(uid, ytId){
    const el = document.getElementById(uid);
    if(!el) return;
    el.outerHTML = `<div class="trailer-embed"><iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" title="Trailer" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
  };

  function renderTicket(dateLabel, data, admitNo){
    const topStory = data.top_story || {};
    const uk = data.uk_corner || {};
    const trailers = (data.trailers||[]).map((t,i) => trailerCard(t,i)).join('') || '<div class="empty-note">No qualifying trailers in the last 24 hours.</div>';
    const briefs = (data.in_brief||[]).map(b => {
      const embed = tweetEmbedPlaceholder(b.tweet_url);
      return `<div class="brief-item">
        <p>${escapeHtml(b.text||'')}</p>
        ${embed}
        ${!b.tweet_url ? sourceLink(b.source_name, b.source_url) : (b.source_url ? readMoreLink(b.source_url) : '')}
      </div>`;
    }).join('') || '<div class="empty-note">Quiet day — nothing new from your accounts in the last 24 hours.</div>';

    const topStoryText = topStory.text || '';
    const topStoryEmbed = tweetEmbedPlaceholder(topStory.tweet_url);
    const topStoryExtra = !topStory.tweet_url ? sourceLink(topStory.source_name, topStory.source_url) : (topStory.source_url ? readMoreLink(topStory.source_url) : '');

    const ukText = uk.text || '';
    const ukEmbed = tweetEmbedPlaceholder(uk.tweet_url);
    const ukExtra = !uk.tweet_url ? sourceLink(uk.source_name, uk.source_url) : (uk.source_url ? readMoreLink(uk.source_url) : '');

    return `
      <div class="ticket">
        <div class="ticket-head">
          <div class="date">${escapeHtml(dateLabel)}</div>
          <div class="adm">ADM. NO ${admitNo}</div>
        </div>
        <div class="ticket-body">
          <div class="section-label">Top Story</div>
          ${topStoryText ? `<div class="top-story"><p>${escapeHtml(topStoryText)}</p></div>` : '<div class="empty-note">Nothing breaking in the last 24 hours.</div>'}
          ${topStoryEmbed}
          ${topStoryExtra}

          <div class="section-label">New Trailers</div>
          <div>${trailers}</div>

          <div class="section-label">In Brief</div>
          <div class="briefs">${briefs}</div>

          <div class="section-label">UK Corner</div>
          ${ukText ? `<div class="uk"><p>${escapeHtml(ukText)}</p></div>` : '<div class="empty-note">Nothing UK-specific today.</div>'}
          ${ukEmbed}
          ${ukExtra}
        </div>
      </div>`;
  }

  function init(){
    const keys = Object.keys(BRIEFINGS).sort().reverse();
    if(!keys.length){
      todayArea.innerHTML = '<div class="status">No briefing yet — the first one lands after the daily routine runs.</div>';
      return;
    }
    const latestKey = keys[0];
    const latestData = BRIEFINGS[latestKey];
    const admit = latestKey.replace(/-/g,'');
    todayArea.innerHTML = renderTicket(prettyDate(latestKey), latestData, admit);
    hydrateTweetEmbeds(todayArea);
    const tstext = (latestData.top_story||{}).text;
    ticker.textContent = '★ ' + prettyDate(latestKey).toUpperCase() + ': ' + (tstext ? tstext.slice(0,90) : 'BRIEFING READY') + ' ★';

    const pastKeys = keys.slice(1, 15);
    if(pastKeys.length){
      archiveLabel.style.display = 'block';
      pastKeys.forEach(key => {
        const data = BRIEFINGS[key];
        const label = prettyDate(key);
        const admitP = key.replace(/-/g,'');
        const wrap = document.createElement('details');
        wrap.className = 'past';
        wrap.innerHTML = `<summary><span>${escapeHtml(label)}</span><span class="d">▾</span></summary><div class="past-body">${renderTicket(label, data, admitP)}</div>`;
        archiveArea.appendChild(wrap);
        wrap.addEventListener('toggle', () => { if(wrap.open){ hydrateTweetEmbeds(wrap); } });
      });
    }
  }

  init();
})();
</script>
</body>
</html>
